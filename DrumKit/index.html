<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <title>Drum Kit</title>
    <link rel="stylesheet" href="index.css" />
    <link
      href="https://fonts.googleapis.com/css?family=Arvo"
      rel="stylesheet"
    />
  </head>

  <body>
    <h1 id="title">Drum 🥁 Kit</h1>
    <div class="set">
      <button class="w drum" aria-label="w drum">w</button>
      <button class="a drum" aria-label="a drum">a</button>
      <button class="s drum" aria-label="s drum">s</button>
      <button class="d drum" aria-label="d drum">d</button>
      <button class="j drum" aria-label="j drum">j</button>
      <button class="k drum" aria-label="k drum">k</button>
      <button class="l drum" aria-label="l drum">l</button>
    </div>

    <footer>Made with ❤️ in London.</footer>

    <script src="index.js" charset="utf-8"></script>
  </body>
</html>
